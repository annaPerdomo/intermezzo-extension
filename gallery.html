<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intermezzo · Exercise QA</title>
<link rel="stylesheet" href="fonts/fonts.css">
<style>
  :root {
    --olive:#2E3650; --sage:#5C6584; --moss:#8A93B2; --forest:#4E5A86;
    --terra:#C08A86; --cream:#FBF8F3; --line:#C6C9D8;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:'DM Sans',-apple-system,system-ui,sans-serif; color:var(--olive);
    background:linear-gradient(135deg,#F1EEF2 0%,#E3E5EF 38%,#D2D6E8 68%,#E9DEDB 100%);
    background-attachment:fixed; min-height:100vh; padding:0 0 80px;
  }
  header {
    position:sticky; top:0; z-index:5; backdrop-filter:blur(8px);
    background:rgba(251,248,243,0.82); border-bottom:1px solid var(--line);
    padding:18px 28px 14px;
  }
  h1 { font-family:'Cormorant',Georgia,serif; font-weight:500; font-size:30px; margin:0 0 4px; }
  .sub { color:var(--sage); font-size:14px; margin:0; }
  .filters { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .filters button {
    font-family:inherit; font-size:13px; cursor:pointer; padding:6px 14px; border-radius:999px;
    border:1px solid var(--moss); background:transparent; color:var(--forest); transition:.15s;
  }
  .filters button.active { background:var(--forest); color:var(--cream); border-color:var(--forest); }
  main { max-width:1180px; margin:0 auto; padding:26px 22px 0; }
  .group-title {
    font-family:'Cormorant',Georgia,serif; font-weight:500; font-size:23px; color:var(--olive);
    margin:30px 4px 4px; display:flex; align-items:baseline; gap:10px;
  }
  .group-title .cnt { font-family:'DM Sans'; font-size:13px; color:var(--moss); }
  .divider { height:1px; background:var(--line); margin:6px 4px 18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:18px; }
  .card {
    background:rgba(255,255,255,0.74); border:1px solid rgba(198,201,216,0.7); border-radius:16px;
    padding:16px; display:flex; flex-direction:column; box-shadow:0 4px 22px rgba(46,54,80,0.06);
  }
  .top { display:flex; gap:14px; align-items:flex-start; }
  .illo { width:96px; height:96px; flex:0 0 96px; border-radius:12px; border:1px solid rgba(198,201,216,0.6);
    background:rgba(255,255,255,0.6); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .illo img.stretch-illo { max-width:88%; max-height:88%; object-fit:contain; -webkit-user-select:none; user-select:none; }
  .illo svg { width:auto; height:82%; max-height:82px; }
  .illo svg [stroke="white"]{stroke:var(--olive);} .illo svg [stroke="#ffd700"]{stroke:var(--moss);}
  .illo svg [fill="#ffd700"]{fill:var(--moss);}
  .illo .orb { width:60px; height:60px; border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(138,147,178,0.38), rgba(192,138,134,0.14) 60%, transparent 76%);
    box-shadow:0 0 0 1px rgba(138,147,178,0.25) inset; }
  .head { min-width:0; }
  .name { font-size:16px; font-weight:600; line-height:1.2; }
  .area { font-size:11px; color:var(--moss); text-transform:uppercase; letter-spacing:.04em; margin-top:3px; }
  .desc { margin-top:11px; font-size:12.8px; line-height:1.5; color:var(--sage); }
  .vid { margin-top:12px; }
  .vthumb { width:100%; aspect-ratio:16/9; border:0; border-radius:10px; cursor:pointer; padding:0;
    background-size:cover; background-position:center; background-color:#d7dae6; position:relative; display:block; }
  .vthumb .play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .vthumb .play span { width:54px; height:54px; border-radius:50%; background:rgba(46,54,80,0.78);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; padding-left:3px; }
  .vid iframe { width:100%; aspect-ratio:16/9; border:0; border-radius:10px; }
  .vcredit { margin-top:6px; font-size:11.5px; color:var(--forest); }
  .vcredit a { color:var(--forest); }
  .vcredit .by { color:var(--moss); }
  .novid { margin-top:12px; font-size:12px; color:var(--moss); font-style:italic;
    border:1px dashed var(--line); border-radius:10px; padding:14px; text-align:center; }
  .qa { margin-top:13px; display:flex; gap:6px; align-items:center; }
  .qa .label { font-size:11px; color:var(--moss); margin-right:2px; }
  .qa button { font-family:inherit; font-size:12px; cursor:pointer; width:32px; height:27px; border-radius:8px;
    border:1px solid var(--line); background:#fff; transition:.12s; }
  .qa button.ok.on { background:#cfe3d4; border-color:#86b094; }
  .qa button.bad.on { background:#f0cfcd; border-color:#c79b97; }
  .card.flag-bad { outline:2px solid var(--terra); }
  .empty { color:var(--sage); padding:40px; text-align:center; }

  /* Timer breakdown — the exact phase sequence the break will run (work pills +
     the counted rests between them), so timing can be eyeballed per exercise. */
  .timer { margin-top:13px; border-top:1px dashed var(--line); padding-top:12px; }
  .timer .tlabel { font-size:10.5px; color:var(--moss); text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
  .tl { display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
  .ph { display:inline-flex; align-items:baseline; gap:5px; padding:5px 9px; border-radius:9px;
        border:1px solid var(--moss); background:rgba(138,147,178,0.10); white-space:nowrap; }
  .ph b { font-size:14px; font-weight:600; color:var(--forest); font-variant-numeric:tabular-nums; }
  .ph .pl { font-size:11px; color:var(--sage); }
  .rest { display:inline-flex; align-items:center; padding:4px 8px; border-radius:9px;
          border:1px dashed var(--terra); color:#9a615c; background:rgba(192,138,134,0.09);
          font-size:11px; white-space:nowrap; }
  .arr { color:var(--moss); font-size:12px; line-height:1; }
  .tsum { margin-top:9px; font-size:11.5px; color:var(--moss); }
  .tsum .warn { color:var(--terra); }
  .timer.untimed { color:var(--sage); font-size:12px; font-style:italic; }

  /* Playable preview — tick through the phases in real time to feel the timing. */
  .tplay { font:inherit; font-size:10.5px; cursor:pointer; margin-left:7px; padding:2px 9px;
    border:1px solid var(--moss); background:#fff; color:var(--forest); border-radius:7px; vertical-align:middle; }
  .tplay:hover { background:rgba(138,147,178,0.12); }
  .ph.on { box-shadow:0 0 0 2px var(--forest); background:rgba(138,147,178,0.20); }
  .rest.on { box-shadow:0 0 0 2px var(--terra); background:rgba(192,138,134,0.18); }
  .ph, .rest { transition:box-shadow .15s, background .15s; }
  .tnow { margin-top:11px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .tnow b { font-size:19px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--olive); line-height:1; }
  .tnow-ph { font-weight:600; font-size:13px; }
  .tnow-ph.work { color:var(--forest); } .tnow-ph.rest { color:var(--terra); } .tnow-ph.done { color:#5a8a66; }
  .tnow-next { font-size:11.5px; color:var(--moss); }
  #speedBtn { font-family:inherit; font-size:13px; cursor:pointer; padding:6px 14px; border-radius:999px;
    border:1px solid var(--moss); background:transparent; color:var(--forest); }
  #speedBtn:hover { background:rgba(138,147,178,0.12); }
</style>
</head>
<body>
<header>
  <h1>Intermezzo · Exercise QA</h1>
  <p class="sub" id="summary"></p>
  <div class="filters">
    <button data-f="all" class="active">All</button>
    <button data-f="stretch">Stretches</button>
    <button data-f="mind">Mind moments</button>
    <button data-f="multi">Multi-phase</button>
    <button data-f="video">Has video</button>
    <button data-f="novideo">No video</button>
    <button data-f="flagged">Flagged ✗</button>
    <span class="sub" id="flagcount" style="margin-left:6px"></span>
    <button id="speedBtn" type="button" title="Preview playback speed" style="margin-left:auto">Preview 1×</button>
  </div>
</header>
<main id="root"></main>

<script src="stretch-illustrations.js"></script>
<script src="stretch-videos.js"></script>
<script src="timer-phases.js"></script>
<script>
const ITEMS = [{"name": "Neck Rolls", "area": "NECK", "desc": "Slowly roll your head in a full circle \u2014 chin to chest, ear to shoulder, head back, other ear to shoulder. Do 3 circles each direction.", "mind": false, "src": "Neck & Upper \u00b7 fig 0"}, {"name": "Shoulder Shrugs & Rolls", "area": "SHOULDERS_UPPER_BACK", "desc": "Raise both shoulders up toward your ears, hold for 2 seconds, then roll them back and down. Repeat 8 times.", "mind": false, "src": "Neck & Upper \u00b7 fig 1"}, {"name": "Seated Spinal Twist", "area": "SPINE", "desc": "Sit tall, place your right hand on your left knee. Gently twist your torso to the left, looking over your left shoulder. Hold 20 seconds, then switch sides.", "mind": false, "src": "Spine \u00b7 fig 0"}, {"name": "Chest Opener", "area": "CHEST_POSTURE", "desc": "Clasp your hands behind your back, straighten your arms, and gently lift them while squeezing your shoulder blades together. Hold for 15 seconds. Repeat twice.", "mind": false, "src": "Chest & Posture \u00b7 fig 0"}, {"name": "Wrist Flexor Stretch", "area": "WRISTS_ARMS", "desc": "Extend one arm forward, palm up. With the other hand, gently pull your fingers down and back toward you. Hold 15 seconds per hand.", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 5"}, {"name": "Standing Forward Fold", "area": "LOWER_BODY", "desc": "Stand up, feet hip-width apart. Slowly fold forward from the hips, letting your head and arms hang heavy. Bend your knees slightly if needed. Just breathe.", "mind": false, "src": "Full Body \u00b7 fig 0"}, {"name": "Cat-Cow (Seated)", "area": "SPINE", "desc": "Sit on the edge of your chair, hands on knees. Inhale \u2014 arch your back and look up (cow). Exhale \u2014 round your spine and tuck chin (cat). Repeat 8 times.", "mind": false, "src": "Spine \u00b7 fig 1"}, {"name": "Hip Flexor Stretch", "area": "HIPS_GLUTES", "desc": "Stand up and take a big step back with one foot. Bend your front knee and sink your hips forward until you feel a stretch in the front of your back hip. Hold 20 seconds per side.", "mind": false, "src": "Hips & Glutes \u00b7 fig 5"}, {"name": "Chin Tucks", "area": "NECK", "desc": "Sit tall. Without tilting your head, pull your chin straight back as if making a double chin. Hold 3 seconds. Repeat 8 times. Looks silly, feels amazing.", "mind": false, "src": "Neck & Upper \u00b7 fig 2"}, {"name": "Wall Angels", "area": "SHOULDERS_UPPER_BACK", "desc": "Stand with your back flat against a wall. Raise your arms to a 'goal post' position against the wall, then slowly slide them up overhead and back down. Repeat 8 times.", "mind": false, "src": null}, {"name": "Figure-4 Stretch", "area": "HIPS_GLUTES", "desc": "Sit tall, cross your right ankle over your left knee. Gently press down on your right knee while leaning slightly forward. Hold 20 seconds per side.", "mind": false, "src": "Hips & Glutes \u00b7 fig 1"}, {"name": "Doorway Chest Stretch", "area": "CHEST_POSTURE", "desc": "Stand in a doorway, place your forearms on either side of the frame at shoulder height. Step one foot forward and lean in until you feel a stretch across your chest. Hold 30 seconds.", "mind": false, "src": "Chest & Posture \u00b7 fig 1"}, {"name": "Walk & Hydrate", "area": "FULL_BODY", "desc": "Get up and walk to the kitchen or water cooler. Fill up your water bottle. Take a slightly longer route back. Your body was made to move, not sit in a chair.", "mind": false, "src": "Full Body \u00b7 fig 2"}, {"name": "Overhead Reach", "area": "SHOULDERS_UPPER_BACK", "desc": "Interlace your fingers, flip your palms up, and reach your arms straight overhead. Lean gently to the left for 5 seconds, then to the right. Repeat twice.", "mind": false, "src": "Full Body \u00b7 fig 1"}, {"name": "Calf Raises", "area": "LOWER_BODY", "desc": "Stand behind your chair and hold the back for balance. Rise up onto your toes, hold for 2 seconds, then slowly lower. Repeat 15 times. Get that blood flowing!", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 0"}, {"name": "Trapezius Release", "area": "NECK", "desc": "Drop your right ear toward your right shoulder. Reach your right hand over your head and gently rest it on the left side of your head \u2014 don't pull, just let the weight of your hand deepen the stretch. Hold 20 seconds per side. Breathe into the tight side.", "mind": false, "src": "Neck & Upper \u00b7 fig 4"}, {"name": "Tennis Ball Rhomboid Release", "area": "SHOULDERS_UPPER_BACK", "desc": "Place a tennis ball (or lacrosse ball, or even a rolled-up sock) between your shoulder blade and your spine. Lean against a wall and slowly roll around until you find a tender spot. Hold pressure on it for 15-20 seconds, then move to the next spot. Do both sides.", "mind": false, "src": null}, {"name": "Scapular Squeeze", "area": "SHOULDERS_UPPER_BACK", "desc": "Sit or stand tall, arms at your sides. Squeeze your shoulder blades together as hard as you can, like you're trying to hold a pencil between them. Hold 5 seconds, release. Repeat 8 times.", "mind": false, "src": null}, {"name": "Thread the Needle", "area": "SPINE", "desc": "Get on all fours. Slide your right arm under your left arm, lowering your right shoulder and temple to the floor. You should feel a deep stretch between your shoulder blades. Hold 20 seconds per side.", "mind": false, "src": null}, {"name": "Cross-Body Shoulder Stretch", "area": "SHOULDERS_UPPER_BACK", "desc": "Bring your right arm across your chest. Use your left hand to gently press your right arm closer to your body just above the elbow. Hold 15 seconds per arm. Focus on feeling it deep behind the shoulder.", "mind": false, "src": null}, {"name": "Eagle Arms", "area": "SHOULDERS_UPPER_BACK", "desc": "Extend arms forward, cross right arm under left at the elbows, then wrap forearms so palms face each other (or get as close as you can). Lift elbows to shoulder height and push hands away from your face. Hold 15 seconds, then switch which arm is on top. This one really gets between the shoulder blades.", "mind": false, "src": null}, {"name": "Levator Scapulae Stretch", "area": "NECK", "desc": "Sit tall. Turn your head 45 degrees to the right, then drop your chin toward your right armpit. Place your right hand on the back of your head and gently add a little pressure. You'll feel this along the side/back of your neck where it meets the shoulder blade. Hold 20 seconds per side.", "mind": false, "src": "Neck & Upper \u00b7 fig 5"}, {"name": "Prone Y Raise", "area": "SHOULDERS_UPPER_BACK", "desc": "Lie face down on the floor (or lean forward over your desk). Extend your arms out at a Y angle, thumbs pointing up. Slowly lift your arms a few inches, squeezing your lower traps. Hold 3 seconds at the top. Repeat 10 times. Strengthens the muscles that keep you from hunching.", "mind": false, "src": null}, {"name": "Bruegger's Relief Position", "area": "CHEST_POSTURE", "desc": "Sit on the edge of your chair, feet wide. Turn your palms outward so thumbs point behind you, open your chest, tuck your chin slightly, and squeeze your shoulder blades down and together. Hold this 'anti-hunch' position for 10 seconds. Repeat 3 times. This is the exact opposite of your hunched posture.", "mind": false, "src": null}, {"name": "Foam Roller Thoracic Extension", "area": "SPINE", "desc": "If you have a foam roller, lie on it lengthwise along your spine, knees bent, feet flat. Let your arms fall out to the sides and just breathe, letting gravity open your chest. Or lie across the roller at mid-back level and gently extend over it. Either way \u2014 60 seconds of undoing the hunch.", "mind": false, "src": "Chest & Posture \u00b7 fig 4"}, {"name": "Pec Minor Release", "area": "CHEST_POSTURE", "desc": "Stand facing a corner. Place a tennis ball on your chest just below your collarbone, near the front of your shoulder. Lean into the corner with the ball pressing into this spot. Small movements to find the tender point, then hold. 20 seconds per side. Tight pec minors pull your shoulders forward \u2014 this releases them.", "mind": false, "src": "Chest & Posture \u00b7 fig 3"}, {"name": "Chin Tuck with Resistance", "area": "NECK", "desc": "Place your fingers on your chin. Push your chin back into a double chin while resisting gently with your fingers. Hold 5 seconds. Repeat 6 times. This strengthens the deep neck flexors that get weak from forward head posture.", "mind": false, "src": "Neck & Upper \u00b7 fig 3"}, {"name": "Suboccipital Release", "area": "NECK", "desc": "Place two tennis balls in a sock, tie it off, and lie down with the balls at the base of your skull \u2014 one on each side of your spine. Just lie there and let gravity do the work. Gently nod 'yes' a few times, then turn 'no' a few times. These tiny muscles lock up from screen staring.", "mind": false, "src": "Neck & Upper \u00b7 fig 6"}, {"name": "Seated Pigeon Pose", "area": "HIPS_GLUTES", "desc": "Sitting in your chair, place your right ankle on your left thigh. Sit tall and gently lean forward from the hips until you feel a deep stretch in your right glute and outer hip. Hold 20 seconds per side. Crossed legs tighten these muscles \u2014 this undoes the damage.", "mind": false, "src": "Hips & Glutes \u00b7 fig 0"}, {"name": "IT Band & Outer Hip Stretch", "area": "HIPS_GLUTES", "desc": "Stand and cross your right foot behind your left. Lean your hips to the right while reaching your left arm overhead to the right. You should feel a stretch along the entire outer left side. Hold 20 seconds per side.", "mind": false, "src": "Hips & Glutes \u00b7 fig 3"}, {"name": "Adductor Stretch", "area": "HIPS_GLUTES", "desc": "Stand with feet wide apart, toes slightly out. Shift your weight to the right, bending your right knee while keeping your left leg straight. Sink into it until you feel a stretch along your inner left thigh. Hold 20 seconds per side. Crossing your legs constantly tightens your adductors.", "mind": false, "src": "Hips & Glutes \u00b7 fig 4"}, {"name": "90/90 Hip Stretch", "area": "HIPS_GLUTES", "desc": "Sit on the floor. Place your right leg in front with knee bent 90 degrees, shin parallel to your body. Place your left leg to the side, also bent 90 degrees. Sit tall and lean gently forward over the front shin. Hold 30 seconds, then switch sides. This hits both internal and external hip rotation \u2014 exactly what gets locked up from sitting cross-legged.", "mind": false, "src": "Hips & Glutes \u00b7 fig 2"}, {"name": "Wall Pec Stretch (Low Angle)", "area": "CHEST_POSTURE", "desc": "Stand next to a wall. Place your right forearm on the wall with elbow BELOW shoulder height (about 45 degrees). Step forward and turn your body away from the wall until you feel a stretch in the lower chest. Hold 15 seconds per side. This angle targets the sternal fibres that round your mid-back forward.", "mind": false, "src": "Chest & Posture \u00b7 fig 2"}, {"name": "Prone Cobra", "area": "SHOULDERS_UPPER_BACK", "desc": "Lie face down, arms at your sides with palms down. Squeeze your shoulder blades together, lift your chest slightly off the floor, and rotate your thumbs toward the ceiling. Hold for 10 seconds. Repeat 3 times. This fires every muscle that your hunched posture has switched off.", "mind": false, "src": "Chest & Posture \u00b7 fig 5"}, {"name": "Nerve Glide \u2014 Median", "area": "WRISTS_ARMS", "desc": "Extend your right arm out to the side, palm up. Slowly tilt your head away from your right arm while extending your wrist (fingers pointing to the floor). You should feel a gentle stretch or tingle from neck to fingertips \u2014 that's the nerve gliding. Repeat slowly 5 times per side. Hunching compresses these nerves.", "mind": false, "src": null}, {"name": "20-20-20 Eye Break", "area": "EYES", "desc": "Look at something at least 20 feet away \u2014 out a window, across the room, anywhere far. Hold your gaze there and let your eyes relax for a full 20 seconds. This resets the focusing muscles that lock up from staring at a screen up close.", "mind": false, "src": "Eyes \u00b7 fig 0"}, {"name": "Eye Palming", "area": "EYES", "desc": "Rub your palms together for a few seconds until they feel warm. Gently cup them over your closed eyes without pressing on the eyeballs. Rest in the warm darkness and breathe slowly for 30 seconds. A lovely little reset for tired, dry eyes.", "mind": false, "src": "Eyes \u00b7 fig 1"}, {"name": "Near-Far Focus Shifts", "area": "EYES", "desc": "Hold your thumb up about a foot from your face and focus on it. Then shift your focus to something far across the room. Hold each for 3 seconds, then switch back. Repeat 8 times. This exercises the eye muscles that get stuck at one distance after hours of screen time.", "mind": false, "src": "Eyes \u00b7 fig 2"}, {"name": "Slow Eye Circles", "area": "EYES", "desc": "Keep your head still and softly close your eyes. Slowly roll your eyes in a big circle \u2014 up, around to the right, down, around to the left. Do 4 slow circles each direction. Gentle and easy, no straining.", "mind": false, "src": "Eyes \u00b7 fig 3"}, {"name": "Knee-to-Chest Stretch", "area": "SPINE", "desc": "Lie on your back with knees bent, feet flat. Gently draw one knee up toward your chest and hug it with both hands, keeping the other foot down. Hold 20 seconds, breathing into your lower back, then switch. Finish by hugging both knees in together. A safe, gentle way to ease a tight, achy lower back.", "mind": false, "src": "Hips & Glutes \u00b7 fig 6"}, {"name": "Pelvic Tilts", "area": "SPINE", "desc": "Lie on your back, knees bent, feet flat on the floor. Slowly tilt your pelvis to press your lower back gently flat into the floor, tightening your belly. Hold 5 seconds, then relax. Repeat 8 times \u2014 small, slow, and easy. One of the kindest moves for a lower back that's seized up.", "mind": false, "src": "Spine \u00b7 fig 3"}, {"name": "Child's Pose", "area": "SPINE", "desc": "From hands and knees, sit your hips back toward your heels and reach your arms forward along the floor, resting your forehead down. Let your lower back round and lengthen. Breathe slowly for 30 seconds. A soothing decompression for a tired, tight lower back.", "mind": false, "src": "Spine \u00b7 fig 5"}, {"name": "Supine Spinal Twist", "area": "SPINE", "desc": "Lie on your back, arms out in a T. Bring your knees together and bend them up, then let both knees drop slowly to one side while you turn your head the other way. Keep both shoulders on the floor. Hold 20 seconds, then switch sides. Releases the lower back and the muscles alongside the spine.", "mind": false, "src": "Spine \u00b7 fig 2"}, {"name": "Gentle Press-Up", "area": "SPINE", "desc": "Lie face down and prop yourself onto your forearms, like a sphinx, keeping your hips and pelvis relaxed on the floor. Let your lower back gently extend and ease into the position \u2014 never push into pain. Hold 10 seconds, lower down, repeat 5 times. A calming counter-stretch after hours of sitting hunched forward.", "mind": false, "src": "Spine \u00b7 fig 4"}, {"name": "Standing Back Extension", "area": "SPINE", "desc": "Stand up, feet hip-width apart. Place your hands on your lower back, fingers pointing down. Gently lean back and look slightly up, opening through your lower spine \u2014 only as far as feels comfortable, never into pain. Hold 5 seconds, return to neutral, repeat 5 times. A quick standing antidote to hours of slumping forward.", "mind": false, "src": "Spine \u00b7 fig 6"}, {"name": "Seated Forward Fold", "area": "SPINE", "desc": "Sit toward the front of your chair, feet flat and slightly apart. Let your upper body fold forward between your knees, arms and head hanging heavy toward the floor. Relax your neck completely and breathe into your lower back. Hold 20-30 seconds, then slowly roll up one vertebra at a time. A lovely lower-back decompression you can do right at your desk.", "mind": false, "src": "Spine \u00b7 fig 7"}, {"name": "Bird-Dog", "area": "SPINE", "desc": "On all fours, hands under shoulders and knees under hips. Slowly reach your right arm forward and your left leg straight back until both are level with your spine. Keep your core tight and hips square \u2014 don't let them tip. Hold 3 seconds, return, then switch sides. Do 6 per side. Builds the deep core strength that protects and steadies a tired lower back.", "mind": false, "src": "Spine \u00b7 fig 8"}, {"name": "Glute Bridge", "area": "HIPS_GLUTES", "desc": "Lie on your back, knees bent, feet flat and hip-width apart. Press through your heels and lift your hips until your body forms a straight line from knees to shoulders. Squeeze your glutes at the top, hold 3 seconds, then lower slowly. Repeat 10 times. Strong glutes take the daily load off an aching lower back.", "mind": false, "src": "Hips & Glutes \u00b7 fig 8"}, {"name": "Standing Hamstring Stretch", "area": "LOWER_BODY", "desc": "Stand tall and place your right heel on a low surface \u2014 a step, a low drawer, or the floor just in front of you. Keep that leg straight and hinge gently forward from the hips until you feel a stretch up the back of the thigh. Keep your back long, not rounded. Hold 20 seconds per side. Tight hamstrings quietly tug on your lower back all day \u2014 this eases the pull.", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 1"}, {"name": "Wrist Extensor Stretch", "area": "WRISTS_ARMS", "desc": "Extend one arm forward, palm facing down. Let your hand drop so your fingers point toward the floor, then use your other hand to gently draw the back of your hand in toward you. Hold 15 seconds per hand. The perfect partner to the palm-up stretch for hands tired from typing and mousing all day.", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 4"}, {"name": "Ankle Pumps & Circles", "area": "LOWER_BODY", "desc": "Sitting tall, lift one foot off the floor. Point your toes away, then pull them back toward your shin \u2014 10 slow pumps. Then trace 5 slow circles with your foot in each direction. Switch feet. Keeps the blood moving in legs that have been still too long, and wakes up stiff ankles.", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 3"}, {"name": "Standing Quad Stretch", "area": "LOWER_BODY", "desc": "Stand tall, holding your chair or a wall for balance. Bend your right knee and catch your right ankle behind you, drawing your heel toward your glute. Keep your knees together and stand upright \u2014 feel the stretch down the front of your thigh. Hold 20 seconds per side. Sitting keeps these muscles short; this lengthens them back out.", "mind": false, "src": "Legs & Circ & Wrists \u00b7 fig 2"}, {"name":"5-4-3-2-1 Grounding","area":"MIND","desc":"Look around and name, slowly: 5 things you can see, 4 you can hear, 3 you can feel, 2 you can smell, and 1 you can taste. No rush — let each one land before the next.","mind":true,"src":"Notice where you are"}, {"name":"One Small Reach","area":"MIND","desc":"Pick one tiny, kind thing to do next — text someone you like a single sentence, refill your water, open a window, step outside for a breath. Just one. Small counts.","mind":true,"src":"A small step forward"}, {"name":"Three Slow Breaths","area":"MIND","desc":"Breathe in slowly through your nose for a count of four, let it out gently for a count of six. Three rounds. Let your shoulders drop a little more each time.","mind":true,"src":"Soften, and breathe"}, {"name":"Name the Feeling","area":"MIND","desc":"Quietly name what you're feeling right now — “this is anxiety,” “this is tiredness,” “this is fine.” You don't have to fix it. Just naming it loosens its grip a little.","mind":true,"src":"However you feel is okay"}, {"name":"A Kind Word to Yourself","area":"MIND","desc":"Think of how you'd talk to a good friend having your exact day. Now offer yourself one sentence in that same gentle voice. You're allowed to be on your own side.","mind":true,"src":"Be gentle with yourself"}, {"name":"Hand on Heart","area":"MIND","desc":"Rest a hand over the centre of your chest and feel its warmth and a little weight. Take a few easy breaths there. This is a small, real kindness you can give yourself any time.","mind":true,"src":"You're here, and that's enough"}, {"name":"Where Are Your Feet?","area":"MIND","desc":"Notice your feet on the floor — the contact, the weight, the support underneath you. The ground has been holding you up this whole time. Let it.","mind":true,"src":"Right here, right now"}, {"name":"A Long Exhale","area":"MIND","desc":"Breathe in, then take a second small sip of air on top. Now let it all go in one long, slow exhale, like a quiet sigh. Do it twice. The body reads a long out-breath as “safe.”","mind":true,"src":"Let the breath go"}, {"name":"Unclench","area":"MIND","desc":"Travel through the usual holding places — jaw, shoulders, hands, belly. Wherever you find tension, let it soften by just a few percent. Not all the way. Just a little is plenty.","mind":true,"src":"Soften what's holding"}, {"name":"Rest Your Eyes Far Away","area":"MIND","desc":"Look up and find the furthest thing you can see — out a window, down the hall, across the room. Let your eyes rest there a few slow breaths. Your gaze, and your mind, can widen.","mind":true,"src":"Look up and out"}, {"name":"Savor One Good Thing","area":"MIND","desc":"Bring to mind one small thing you liked recently — a taste, a song, a message, a patch of sun. Replay it for a few seconds and let yourself actually enjoy it again. Good moments count twice when you revisit them.","mind":true,"src":"Linger on something good"}, {"name":"Send a Good Thought","area":"MIND","desc":"Picture someone you care about, anyone at all. Silently wish them one good thing — “I hope your day is gentle.” Warmth sent quietly outward tends to warm you a little too.","mind":true,"src":"Someone you care about"}, {"name":"Put It Down for a Minute","area":"MIND","desc":"Name the thing that's been tugging at your attention. Now imagine setting it gently on a shelf — it'll still be there later. You're allowed to put a worry down for a minute and just breathe.","mind":true,"src":"You can set it down"}, {"name":"One Thing Ahead","area":"MIND","desc":"Name one small thing you're looking forward to — even tiny. Dinner, a show, a weekend, a hot shower. Let yourself feel a flicker of it. A little something ahead is its own kind of fuel.","mind":true,"src":"Something small to come"}, {"name":"Thought or Fact?","area":"MIND","desc":"Catch the thought that's weighing on you right now. Ask it, gently: is this a fact, or a thought my mind is handing me? Thoughts can feel completely true and still not be facts.","mind":true,"src":"A thought is not a fact"}, {"name":"I'm Having the Thought That…","area":"MIND","desc":"Take the thought that's stuck and quietly put four words in front of it: “I'm having the thought that…” Notice the small bit of space that opens. You're the one noticing the thought — you aren't the thought.","mind":true,"src":"Make a little space"}, {"name":"Name the Thinking Trap","area":"MIND","desc":"Notice a worried thought and see if it fits a familiar shape — all-or-nothing, jumping to the worst, assuming what others think. You don't have to argue with it. Just naming the pattern loosens its hold.","mind":true,"src":"Notice the pattern"}, {"name":"What's Most Likely?","area":"MIND","desc":"Anxiety likes to show you the worst version of things. For a moment, ask instead: what's the most likely outcome, not the scariest one? And if a hard thing did come — you've made it through hard things before.","mind":true,"src":"Most likely, not worst case"}, {"name":"A Fairer Thought","area":"MIND","desc":"Take the harsh thing your mind is saying about you or your day. Now find a fairer, more balanced version — not forced sunshine, just truer. “This is hard, and I'm still showing up” often fits better than the harsh one.","mind":true,"src":"True and kind can both fit"}, {"name":"The Next Five Minutes","area":"MIND","desc":"When everything feels heavy, the mind says wait until you feel like it. It often works the other way — the doing comes first, and the feeling follows a little. Pick one thing you could do for just five minutes. Motion, not motivation.","mind":true,"src":"Start small, start anyway"}, {"name":"Opposite Action","area":"MIND","desc":"Notice what the low mood is nudging you to do — curl up, cancel, go quiet. Just for now, consider one small move in the opposite direction. You don't have to feel it first to take the step.","mind":true,"src":"One step the other way"}, {"name":"Catch One Good Fact","area":"MIND","desc":"A low mood quietly filters out the good. Push back, gently — find one small fact from today that went okay, and let it count. You're gathering the evidence your mind tends to skip past.","mind":true,"src":"Let one good thing count"}, {"name":"Soften a 'Should'","area":"MIND","desc":"Listen for a “should” or “must” running underneath — I should be further along, I must not get this wrong. Try trading it for “it would be nice if,” and notice how the pressure eases a little.","mind":true,"src":"Less should, more soft"}, {"name":"Feelings Aren't Facts","area":"MIND","desc":"When a feeling is loud, the mind treats it as proof — I feel like a failure, so I must be one. Gently separate the two: this is a feeling moving through you, not a verdict on who you are. Feelings are real, and they aren't facts.","mind":true,"src":"A feeling, not a verdict"}, {"name":"A Gentle Check-In","area":"MIND","desc":"Interactive check-in — a savoring note plus a 1–5 mood scale.","mind":true,"src":"A moment with yourself"}];
const AREA_LABEL = {"EYES": "Eyes", "NECK": "Neck", "SHOULDERS_UPPER_BACK": "Shoulders & Upper Back", "CHEST_POSTURE": "Chest & Posture", "SPINE": "Spine", "HIPS_GLUTES": "Hips & Glutes", "LOWER_BODY": "Legs & Lower Body", "WRISTS_ARMS": "Wrists & Arms", "FULL_BODY": "Full Body", "MIND": "Mind Moments"};
const AREA_ORDER = ["EYES", "NECK", "SHOULDERS_UPPER_BACK", "CHEST_POSTURE", "SPINE", "HIPS_GLUTES", "LOWER_BODY", "WRISTS_ARMS", "FULL_BODY", "MIND"];

// Per-exercise durations (mirrors background.js). Combined with each entry's
// description, this drives timer-phases.js to show the exact phase sequence the
// break will run — keep in sync with background.js if a duration changes.
const DURATIONS = {"Neck Rolls":"30 seconds","Shoulder Shrugs & Rolls":"30 seconds","Seated Spinal Twist":"40 seconds","Chest Opener":"30 seconds","Wrist Flexor Stretch":"30 seconds","Standing Forward Fold":"30 seconds","Cat-Cow (Seated)":"40 seconds","Hip Flexor Stretch":"40 seconds","Chin Tucks":"20 seconds","Wall Angels":"64 seconds","Figure-4 Stretch":"40 seconds","Doorway Chest Stretch":"30 seconds","Walk & Hydrate":"2 minutes","Overhead Reach":"20 seconds","Calf Raises":"30 seconds","Trapezius Release":"40 seconds","Tennis Ball Rhomboid Release":"60 seconds","Scapular Squeeze":"30 seconds","Thread the Needle":"40 seconds","Cross-Body Shoulder Stretch":"30 seconds","Eagle Arms":"30 seconds","Levator Scapulae Stretch":"40 seconds","Prone Y Raise":"30 seconds","Bruegger's Relief Position":"20 seconds","Foam Roller Thoracic Extension":"60 seconds","Pec Minor Release":"40 seconds","Chin Tuck with Resistance":"20 seconds","Suboccipital Release":"40 seconds","Seated Pigeon Pose":"40 seconds","IT Band & Outer Hip Stretch":"40 seconds","Adductor Stretch":"40 seconds","90/90 Hip Stretch":"60 seconds","Wall Pec Stretch (Low Angle)":"30 seconds","Prone Cobra":"30 seconds","Nerve Glide — Median":"30 seconds","20-20-20 Eye Break":"20 seconds","Eye Palming":"30 seconds","Near-Far Focus Shifts":"30 seconds","Slow Eye Circles":"30 seconds","Knee-to-Chest Stretch":"60 seconds","Pelvic Tilts":"40 seconds","Child's Pose":"30 seconds","Supine Spinal Twist":"50 seconds","Gentle Press-Up":"40 seconds","Standing Back Extension":"30 seconds","Seated Forward Fold":"30 seconds","Bird-Dog":"50 seconds","Glute Bridge":"40 seconds","Standing Hamstring Stretch":"40 seconds","Wrist Extensor Stretch":"30 seconds","Ankle Pumps & Circles":"40 seconds","Standing Quad Stretch":"40 seconds"};

// The phase sequence for one entry (cached on the item). Mind moments aren't
// timed during a break, so they have none.
function phasesFor(it){
  if (it.mind) return null;
  if (!it._phases) {
    it._phases = parsePhases({ name: it.name, duration: DURATIONS[it.name] || "30 seconds", description: it.desc });
  }
  return it._phases;
}

// Name the overall shape from the phases, for the summary line.
function shapeOf(phases){
  const reps = phases.filter(p=>p.kind==="rep").length;
  if (reps) return `${reps} reps · paced`;
  const work = phases.filter(p=>p.kind==="work");
  const l = (work[0] && work[0].label) || "";
  if (/\bside|hand|arm|leg\b/i.test(l)) return `${work.length} sides`;
  if (/direction/i.test(l)) return "2 directions";
  if (/Round/i.test(l)) return `${work.length} rounds`;
  return work.length > 1 ? `${work.length} parts` : "single hold";
}

// Render the timer breakdown: a pill per phase (work, with seconds + label;
// rest, dashed/terracotta) plus a summary of holds, work/rest seconds, and a
// flag when the labeled duration disagrees with the summed holds.
function timerHTML(it){
  if (it.mind) return `<div class="timer untimed">Untimed · self-paced — no countdown during the break</div>`;
  const phases = phasesFor(it);
  if (!phases) return '';
  const workSec = phases.filter(p=>p.kind!=="rest").reduce((a,p)=>a+p.seconds,0);
  const restSec = phases.filter(p=>p.kind==="rest").reduce((a,p)=>a+p.seconds,0);
  const labelSec = parseDuration(DURATIONS[it.name] || "");

  // A flowing rep set (reps + the short rests between them) is the whole phase
  // list — collapse it to ONE "8×8s reps · 3s rest between" pill rather than 15+
  // alternating pills. data-pi/data-span let the preview highlight it throughout
  // while the readout counts the current rep. Everything else is one pill/phase.
  const repList = phases.filter(p=>p.kind==="rep");
  let pills;
  if (repList.length) {
    const per = repList[0].seconds;
    const between = phases.find(p=>p.kind==="rest");
    const btw = between ? ` <span class="pl">· ${between.seconds}s rest between</span>` : '';
    pills = `<span class="ph reps" data-pi="0" data-span="${phases.length}"><b>${repList.length}×${per}s</b> <span class="pl">reps</span>${btw}</span>`;
  } else {
    pills = phases.map((p,i)=>{
      if (p.kind==="rest") return `<span class="rest" data-pi="${i}">${esc(p.label)} · ${p.seconds}s</span>`;
      const lbl = p.label ? ` <span class="pl">${esc(p.label)}</span>` : '';
      return `<span class="ph" data-pi="${i}"><b>${p.seconds}s</b>${lbl}</span>`;
    }).join('<span class="arr">→</span>');
  }

  let sum = `${shapeOf(phases)} · ${workSec}s work`;
  if (restSec) sum += ` + ${restSec}s rest = ${workSec+restSec}s`;
  if (labelSec && labelSec !== workSec) sum += ` <span class="warn">· labeled ${labelSec}s</span>`;

  return `<div class="timer">
    <div class="tlabel">Timer <button class="tplay" type="button">▶ Preview</button></div>
    <div class="tl">${pills}</div>
    <div class="tnow" hidden></div>
    <div class="tsum">${sum}</div></div>`;
}

// ---- Playable preview: tick the real phase list in real time, highlighting the
// active phase and showing how long until the next thing starts. One at a time. ----
let player = null;
let previewSpeed = 1;

function fmtClock(s){ return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

function stopPlayer(){
  if (!player) return;
  clearInterval(player.iv);
  player.timerEl.querySelectorAll('[data-pi]').forEach(e=>e.classList.remove('on'));
  const btn = player.timerEl.querySelector('.tplay'); if (btn) btn.textContent = '▶ Preview';
  const now = player.timerEl.querySelector('.tnow'); if (now){ now.hidden = true; now.innerHTML = ''; }
  player = null;
}

function startPreview(timerEl, phases){
  stopPlayer();
  if (!phases || !phases.length) return;
  const pills = [...timerEl.querySelectorAll('[data-pi]')];
  const now = timerEl.querySelector('.tnow');
  const btn = timerEl.querySelector('.tplay');
  btn.textContent = '■ Stop';
  now.hidden = false;
  let pi = 0, rem = phases[0].seconds;
  player = { timerEl, iv: null };

  const paint = () => {
    // A pill may cover a range of phases (a collapsed rep run) — light it while
    // the playhead is anywhere inside [data-pi, data-pi+data-span).
    pills.forEach(e=>{
      const start = +e.dataset.pi, span = +(e.dataset.span || 1);
      e.classList.toggle('on', pi >= start && pi < start + span);
    });
    const cur = phases[pi], next = phases[pi+1];
    const curName = cur.kind==='rest' ? cur.label : (cur.label || 'Hold');
    const nextTxt = next
      ? `next: ${next.kind==='rest' ? next.label : (next.label || 'hold')}`
      : 'last one — then done';
    now.innerHTML =
      `<span class="tnow-ph ${cur.kind}">${esc(curName)}</span>` +
      `<b>${fmtClock(Math.max(rem,0))}</b>` +
      `<span class="tnow-next">${esc(nextTxt)}</span>`;
  };
  paint();

  player.iv = setInterval(() => {
    rem--;
    if (rem < 0) {
      pi++;
      if (pi >= phases.length) {            // whole sequence done
        clearInterval(player.iv);
        pills.forEach(e=>e.classList.remove('on'));
        now.innerHTML = `<span class="tnow-ph done">Done ✓</span>`;
        btn.textContent = '▶ Preview';
        player = null;
        return;
      }
      rem = phases[pi].seconds;
    }
    paint();
  }, Math.max(60, Math.round(1000 / previewSpeed)));
}

const Store = (() => {
  try {
    const k = '__imz_probe__';
    localStorage.setItem(k, '1'); localStorage.removeItem(k);
    return {
      durable: true,
      get: k => localStorage.getItem(k),
      set: (k, v) => localStorage.setItem(k, v),
    };
  } catch (e) {}
  // Fallback: cookie (works in some environments where localStorage is blocked).
  try {
    document.cookie = '__imz_probe__=1;path=/;max-age=1';
    if (document.cookie.indexOf('__imz_probe__=1') !== -1) {
      const readCookie = k => {
        const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
        return m ? decodeURIComponent(m[1]) : null;
      };
      return {
        durable: true,
        get: k => readCookie(k),
        set: (k, v) => { document.cookie = k + '=' + encodeURIComponent(v) + ';path=/;max-age=31536000'; },
      };
    }
  } catch (e) {}
  // Last resort: in-memory only (won't survive reloads, but won't throw either).
  const mem = {};
  return { durable: false, get: k => (k in mem ? mem[k] : null), set: (k, v) => { mem[k] = v; } };
})();

const flags = JSON.parse(Store.get('imz_exercise_qa') || '{}'); // name -> 'ok'|'bad'
let filter = 'all';

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hasImg(name){ return STRETCH_IMAGE_SLUGS.has(stretchSlug(name)); }
function vid(name){ return (typeof STRETCH_VIDEOS!=='undefined') ? STRETCH_VIDEOS[name] : null; }
function videoId(url){
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?&]+)/) || url.match(/embed\/([^?&]+)/);
  return m ? m[1] : null;
}
function saveFlags(){ Store.set('imz_exercise_qa', JSON.stringify(flags)); render(); }

if (!Store.durable) {
  const warn = document.createElement('div');
  warn.style.cssText = 'background:#f0cfcd;color:#7a3b37;font-size:13px;padding:8px 28px;border-bottom:1px solid #c79b97;';
  warn.textContent = '⚠ Storage is blocked in this browser/context (common when opening the file directly). Your ✓/✗ marks won’t survive a reload — serve this folder over a local server (e.g. `python3 -m http.server`) to keep them.';
  document.body.insertBefore(warn, document.body.firstChild);
}

function mediaFor(it){
  if (it.mind && !hasImg(it.name)) return `<div class="illo"><span class="orb"></span></div>`;
  return `<div class="illo">${getStretchVisual(it.name)}</div>`;
}

function render(){
  stopPlayer(); // a re-render replaces the cards — drop any running preview
  const root = document.getElementById('root'); root.innerHTML='';
  const stretches = ITEMS.filter(i=>!i.mind), mind = ITEMS.filter(i=>i.mind);
  const withVideo = ITEMS.filter(i=>vid(i.name)).length;
  const multiPhase = stretches.filter(i=>{ const ph=phasesFor(i); return ph && ph.length>1; }).length;
  document.getElementById('summary').textContent =
    `${ITEMS.length} exercises · ${stretches.length} stretches · ${mind.length} mind moments · ` +
    `${multiPhase} multi-phase (sets · sides · reps) · ${withVideo} with a YouTube demo · tap ✓ / ✗ to QA each entry.`;
  const bad = Object.values(flags).filter(v=>v==='bad').length;
  document.getElementById('flagcount').textContent = bad ? `${bad} flagged` : '';

  let shown=0;
  for(const area of AREA_ORDER){
    let list = ITEMS.filter(i=>i.area===area).filter(it=>{
      const v = vid(it.name);
      if(filter==='stretch') return !it.mind;
      if(filter==='mind') return it.mind;
      if(filter==='multi') { const ph=phasesFor(it); return !!ph && ph.length>1; }
      if(filter==='video') return !!v;
      if(filter==='novideo') return !v;
      if(filter==='flagged') return flags[it.name]==='bad';
      return true;
    });
    if(!list.length) continue;
    const t=document.createElement('div'); t.className='group-title';
    t.innerHTML = `${AREA_LABEL[area]||area} <span class="cnt">${list.length}</span>`;
    root.appendChild(t);
    const d=document.createElement('div'); d.className='divider'; root.appendChild(d);
    const g=document.createElement('div'); g.className='grid';
    for(const it of list){
      shown++;
      const v = vid(it.name); const id = v ? videoId(v.url) : null;
      const card=document.createElement('div'); card.className='card'+(flags[it.name]==='bad'?' flag-bad':'');

      let videoBlock;
      if (v && id) {
        const thumb = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
        videoBlock = `<div class="vid">
            <button class="vthumb" data-embed="${id}" style="background-image:url('${thumb}')" title="Play video">
              <span class="play"><span>▶</span></span></button>
            <div class="vcredit">▶ <a href="${v.url}" target="_blank" rel="noopener">Watch on YouTube</a>
              <span class="by">· ${esc(v.creator)}</span></div>
          </div>`;
      } else {
        videoBlock = `<div class="novid">${it.mind?'mind moment — no demo video':'no demo video'}</div>`;
      }

      card.innerHTML = `
        <div class="top">
          ${mediaFor(it)}
          <div class="head"><div class="name">${esc(it.name)}</div>
            <div class="area">${esc(AREA_LABEL[it.area]||it.area)}</div></div>
        </div>
        <div class="desc">${esc(it.desc)}</div>
        ${timerHTML(it)}
        ${videoBlock}
        <div class="qa"><span class="label">QA</span>
          <button class="ok ${flags[it.name]==='ok'?'on':''}" title="looks good">✓</button>
          <button class="bad ${flags[it.name]==='bad'?'on':''}" title="wrong / needs fixing">✗</button>
        </div>`;

      // mind illustration that 404s -> orb fallback
      if (it.mind && hasImg(it.name)) {
        const mi = card.querySelector('img.stretch-illo');
        if (mi) mi.addEventListener('error', () => {
          const ph = document.createElement('span'); ph.className='orb';
          mi.replaceWith(ph);
        }, { once: true });
      }
      // click thumbnail -> inline embed
      const vt = card.querySelector('.vthumb');
      if (vt) vt.onclick = () => {
        const fid = vt.getAttribute('data-embed');
        const ifr = document.createElement('iframe');
        ifr.src = `https://www.youtube.com/embed/${fid}?autoplay=1`;
        ifr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        ifr.allowFullscreen = true;
        vt.replaceWith(ifr);
      };
      const [okB,badB]=card.querySelectorAll('.qa button');
      okB.onclick=()=>{ flags[it.name]= flags[it.name]==='ok'?undefined:'ok'; saveFlags(); };
      badB.onclick=()=>{ flags[it.name]= flags[it.name]==='bad'?undefined:'bad'; saveFlags(); };
      // Preview: play this card's countdown (or stop it if it's already running).
      const playBtn = card.querySelector('.tplay');
      if (playBtn) playBtn.onclick = () => {
        const tEl = card.querySelector('.timer');
        if (player && player.timerEl === tEl) stopPlayer();
        else startPreview(tEl, phasesFor(it));
      };
      g.appendChild(card);
    }
    root.appendChild(g);
  }
  if(!shown){ const e=document.createElement('div'); e.className='empty'; e.textContent='Nothing here for this filter.'; root.appendChild(e); }
}
document.querySelectorAll('.filters button[data-f]').forEach(b=>{
  b.onclick=()=>{ filter=b.dataset.f; document.querySelectorAll('.filters button[data-f]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
});

// Preview playback speed — cycles 1× → 2× → 4× for the long single timers.
document.getElementById('speedBtn').onclick = (e) => {
  previewSpeed = previewSpeed === 1 ? 2 : previewSpeed === 2 ? 4 : 1;
  e.target.textContent = `Preview ${previewSpeed}×`;
};

render();
</script>
</body>
</html>
