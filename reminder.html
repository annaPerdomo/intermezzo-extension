<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intermezzo — Wellness Break</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="reminder.css">
</head>
<body class="breath-on">

  <!-- ============================================================
       MOVING BACKGROUND — gently breathing wash + drifting leaves
       ============================================================ -->
  <div class="zen-bg" aria-hidden="true">
    <div class="bg-base"></div>
    <div class="breath-layer"></div>
  </div>

  <!-- ============================================================
       ACTIVE STRETCH SCREEN
       ============================================================ -->
  <div class="container" id="activeScreen">
    <h1 class="page-title">Time for an Interlude</h1>
    <p class="subtitle" id="subtitle"></p>

    <!-- Fermata divider -->
    <div class="staff-divider">
      <div class="divider-line"></div>
      <span class="fermata-breathe" data-glyph="fermata"></span>
      <div class="divider-line"></div>
    </div>

    <div class="progress-label" id="progressLabel">Exercise 1 of 3</div>

    <div class="exercise-area">
      <div class="breathing-glow"></div>
      <button class="nav-arrow nav-prev" id="prevBtn" aria-label="Previous exercise">&lsaquo;</button>

      <div class="exercise-panel" id="exercisePanel">
        <div class="card-media" id="cardMedia"></div>
        <div class="card-content">
          <div class="card-info" id="stretchInfo"></div>
          <div class="card-timer">
            <div class="phase-label" id="phaseLabel"></div>
            <div class="timer-ring-container">
              <svg class="timer-ring" viewBox="0 0 180 180">
                <circle class="timer-ring-bg" cx="90" cy="90" r="84" />
                <circle class="timer-ring-glow" cx="90" cy="90" r="84" id="timerGlow" />
                <circle class="timer-ring-progress" cx="90" cy="90" r="84" id="timerRing" />
              </svg>
              <div class="timer-center">
                <div class="timer-display" id="timer">0:30</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="nav-arrow nav-next" id="nextBtn" aria-label="Next exercise">&rsaquo;</button>
    </div>

    <div class="progress-dots" id="exerciseProgress"></div>

    <!-- Footer divider — an eighth note, distinct from the header fermata -->
    <div class="staff-divider">
      <div class="divider-line"></div>
      <span class="fermata-breathe" data-glyph="eighthNote"></span>
      <div class="divider-line"></div>
    </div>

    <div class="actions">
      <button class="btn btn-skip" id="skipBtn">Skip for now</button>
      <button class="btn btn-done" id="doneBtn">Done &#x2713;</button>
    </div>
  </div>

  <!-- ============================================================
       COMPLETED SCREEN — pride moment
       ============================================================ -->
  <div class="done-screen" id="doneScreen">
    <div class="completion-deco" aria-hidden="true"></div>
    <div class="completion-inner">
      <div class="completion-message">
        <div class="completion-eyebrow">Interlude complete</div>

        <div class="completion-emblem">
          <span class="halo"></span>
          <span class="completion-mark" data-glyph="quarter-rest"></span>
        </div>

        <h2 class="completion-title">Beautifully done.</h2>
        <p class="completion-sub" id="doneMessage">You showed up for yourself and gave your body what it needed. However it felt, that&rsquo;s enough &mdash; and it&rsquo;s something to feel proud of.</p>

        <div class="completion-actions">
          <button class="completion-btn" id="closeBtn">Back to your day</button>
          <button class="completion-btn-ghost" id="newStretchBtn">Another interlude</button>
        </div>
      </div>

      <div class="completion-summary">
        <div class="completion-stats">
          <div class="stat-chip">
            <span class="stat-value" id="statExercises">0</span>
            <span class="stat-label" id="statExercisesLabel">Exercises</span>
          </div>
          <div class="stat-chip">
            <span class="stat-value" id="statMinutes">0</span>
            <span class="stat-label" id="statMinutesLabel">Minutes moved</span>
          </div>
          <div class="stat-chip">
            <span class="stat-value" id="statBreaks">0</span>
            <span class="stat-label" id="statBreaksLabel">Breaks today</span>
          </div>
        </div>
        <p class="completion-count" id="motivational"></p>
      </div>
    </div>
  </div>

  <script src="stretch-illustrations.js"></script>
  <script src="stretch-videos.js"></script>
  <script src="reminder.js"></script>
</body>
</html>
